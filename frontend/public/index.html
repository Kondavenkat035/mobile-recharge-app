<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile Recharge App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0072ff;
    }

    .message {
      margin-top: 20px;
      font-size: 18px;
      color: #00ffcc;
    }

    .plans {
      margin-top: 20px;
      text-align: left;
    }

    .plan {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .plan:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📱 Mobile Recharge</h1>

  <input id="mobile" placeholder="Enter Mobile Number">
  <input id="amount" placeholder="Enter Amount">

  <button onclick="recharge()">Recharge Now</button>

  <div class="plans">
    <h3>Popular Plans</h3>
    <div class="plan" onclick="selectPlan(199)">₹199 - 28 Days</div>
    <div class="plan" onclick="selectPlan(299)">₹299 - 56 Days</div>
    <div class="plan" onclick="selectPlan(499)">₹499 - 84 Days</div>
  </div>

  <div class="message" id="message"></div>
</div>

<script>
  function selectPlan(amount) {
    document.getElementById('amount').value = amount;
  }

  async function recharge() {
    const mobile = document.getElementById('mobile').value;
    const amount = document.getElementById('amount').value;

    const res = await fetch('http://localhost:5000/recharge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mobile, amount })
    });

    const data = await res.json();
    document.getElementById('message').innerText = data.message;
  }
</script>

</body>
</html>
